<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" role="img" aria-label="MX Player clone thumbnail">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#141a33"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2bb3ff"/>
      <stop offset="1" stop-color="#1565ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a00"/>
      <stop offset="1" stop-color="#ff4d4d"/>
    </linearGradient>
  </defs>

  <rect width="480" height="300" fill="url(#bg)"/>
  <circle cx="240" cy="135" r="130" fill="#1b5cff" opacity="0.12"/>

  <!-- play button -->
  <circle cx="240" cy="120" r="52" fill="url(#play)"/>
  <circle cx="240" cy="120" r="52" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2.5"/>
  <path d="M225 95 L268 120 L225 145 Z" fill="#ffffff"/>

  <!-- MX wordmark -->
  <text x="240" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff">MX <tspan fill="#2bb3ff">Player</tspan></text>

  <!-- progress bar -->
  <rect x="120" y="248" width="240" height="5" rx="2.5" fill="#ffffff" opacity="0.18"/>
  <rect x="120" y="248" width="100" height="5" rx="2.5" fill="url(#accent)"/>
  <circle cx="220" cy="250.5" r="6.5" fill="#ff6a3d"/>
</svg>
